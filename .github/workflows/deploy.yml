# =============================================================================
# CI/CD PIPELINE — GitHub Actions
#
# WHAT THIS FILE DOES:
#   Every git push to main runs 3 jobs in sequence:
#     1. lint    → checks code quality with ruff (fast, ~30s)
#     2. build   → builds Docker image, pushes to GCP Artifact Registry
#     3. deploy  → deploys new image to GCP Cloud Run (only on main, not PRs)
#
# PULL REQUEST BEHAVIOUR:
#   PRs run lint + build (validates the code) but NOT deploy.
#   WHY: you never want an untested PR branch to go live automatically.
#
# HOW SECRETS WORK:
#   GitHub encrypts secrets and injects them as env vars at runtime.
#   They never appear in logs. Never hardcode credentials here.
#
# REQUIRED GITHUB SECRETS (Settings → Secrets → Actions):
#   GCP_PROJECT_ID  — your GCP project ID (e.g. rag-chatbot-v3-429301)
#   GCP_SA_KEY      — full contents of the service account JSON key file
#   GROQ_API_KEY    — your Groq API key
#   QDRANT_URL      — your Qdrant Cloud cluster URL
#   QDRANT_API_KEY  — your Qdrant Cloud API key
# =============================================================================

name: CI/CD — Build and Deploy

on:
  push:
    branches: [main]       # deploy pipeline: runs on every push to main
  pull_request:
    branches: [main]       # validation only: lint + build, no deploy

# Top-level env vars available to all jobs
env:
  PROJECT_ID:   ${{ secrets.GCP_PROJECT_ID }}
  REGION:       asia-south1                          # Mumbai — closest to India
  SERVICE_NAME: rag-chatbot-v3
  REGISTRY:     asia-south1-docker.pkg.dev           # Artifact Registry endpoint


# =============================================================================
# JOB 1: LINT
# Runs ruff — the fastest Python linter (written in Rust).
# Catches import errors, undefined names, unused imports before building.
# If lint fails, the build job never starts — saves you 3-4 min of waiting.
# =============================================================================
jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest   # GitHub-hosted runner, free tier

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        # WHY v4: always pin to a major version tag, not @main or @latest.
        # Unpinned actions can silently change and break your pipeline.

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"       # caches pip downloads between runs (~30s saved)

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff linter
        # Ignored rules — all style-only, not real bugs:
        # E501 = line too long
        # E401 = multiple imports on one line
        # E701 = multiple statements on one line (colon)
        # F401 = imported but unused (these are __init__.py re-exports)
        # F403 = star import used (config/__init__.py pattern)
        # F541 = f-string without placeholders
        run: ruff check . --ignore E501,E401,E701,F401,F403,F541


# =============================================================================
# JOB 2: BUILD
# Builds the Docker image and pushes it to GCP Artifact Registry.
# Tags the image with two tags:
#   - git SHA (short): immutable, traceable — e.g. :a1b2c3d
#   - latest:          convenience tag for manual pulls
#
# WHY git SHA tags?
#   If a deploy goes wrong, you can roll back to a specific commit's image
#   by deploying the SHA tag. :latest is mutable and can't be rolled back to.
# =============================================================================
  build:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    needs: lint              # only runs if lint passes
    outputs:
      # Pass the full image URI to the deploy job
      image: ${{ steps.set-image.outputs.image }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
        # WHY: This action exchanges the service account JSON key for a
        # short-lived OAuth token that all subsequent gcloud/docker commands use.

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker to use Artifact Registry
        # Without this, `docker push` doesn't know how to authenticate to
        # asia-south1-docker.pkg.dev. This command adds auth credentials
        # to Docker's config for that registry domain.
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Generate image URI with git SHA tag
        id: set-image
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          IMAGE="${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}/${{ env.SERVICE_NAME }}:${SHORT_SHA}"
          echo "image=${IMAGE}" >> $GITHUB_OUTPUT
          echo "Building image: ${IMAGE}"

      - name: Build Docker image
        run: |
          docker build \
            --tag ${{ steps.set-image.outputs.image }} \
            --tag ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}/${{ env.SERVICE_NAME }}:latest \
            --label "git-commit=${{ github.sha }}" \
            --label "build-date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            .
        # --label adds metadata to the image — visible in Artifact Registry console.
        # Useful for auditing: "which commit built this image?"

      - name: Push both tags to Artifact Registry
        run: |
          docker push ${{ steps.set-image.outputs.image }}
          docker push ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}/${{ env.SERVICE_NAME }}:latest


# =============================================================================
# JOB 3: DEPLOY
# Deploys the new image to Cloud Run.
#
# WHY if: condition?
#   github.event_name == 'push' ensures this ONLY runs on actual pushes to main.
#   Pull requests trigger the workflow too (for lint+build validation), but
#   we never want a PR branch to automatically deploy to production.
#
# ZERO-DOWNTIME DEPLOYMENT:
#   Cloud Run handles this automatically. It spins up the new revision,
#   waits for it to be healthy, then shifts 100% traffic to it.
#   The old revision stays warm briefly as a fallback.
# =============================================================================
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image=${{ needs.build.outputs.image }} \
            --platform=managed \
            --region=${{ env.REGION }} \
            --allow-unauthenticated \
            --port=8000 \
            --memory=1Gi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=2 \
            --set-env-vars="GROQ_API_KEY=${{ secrets.GROQ_API_KEY }},QDRANT_URL=${{ secrets.QDRANT_URL }},QDRANT_API_KEY=${{ secrets.QDRANT_API_KEY }}" \
            --timeout=300 \
            --quiet
        # Flag explanations:
        # --allow-unauthenticated: public access (needed for a portfolio demo)
        # --min-instances=0:       scale to zero when idle = zero cost at rest
        # --max-instances=2:       free tier cap; prevents runaway billing
        # --memory=1Gi:            sentence-transformers + reranker need ~700MB
        # --timeout=300:           max request duration — 5 min for long RAG chains
        # --set-env-vars:          injects secrets as env vars into the container

      - name: Print deployed service URL
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --platform=managed \
            --region=${{ env.REGION }} \
            --format='value(status.url)')
          echo "Deployed at: ${URL}"
          echo "Service URL: ${URL}" >> $GITHUB_STEP_SUMMARY
        # $GITHUB_STEP_SUMMARY writes to the Actions run summary page —
        # you'll see the live URL right in the GitHub Actions UI.
